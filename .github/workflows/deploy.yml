# Workflow to build and deploy site to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Runs on pushes to the main branch
      - master # Also support master branch

permissions:
  contents: write # Required to push the built assets to gh-pages branch

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder the build script populates
          branch: gh-pages # The branch the action should deploy to
          clean: true # Automatically remove obsolete files
