<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>৪০৪ — পাতাটি খুঁজে পাওয়া যায়নি | নীলাশা</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Hind Siliguri', sans-serif;
        background-color: #F8F9FA;
        color: #222222;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }
      .container {
        max-width: 500px;
        padding: 40px 20px;
        background-color: #ffffff;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(31, 78, 121, 0.05);
        border: 1px solid #E2E8F0;
      }
      .logo {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #1F4E79, #00897B);
        color: #ffffff;
        font-size: 28px;
        font-weight: bold;
        line-height: 60px;
        border-radius: 16px;
        margin: 0 auto 24px;
      }
      h1 {
        font-size: 32px;
        margin: 0 0 12px;
        color: #1F4E79;
      }
      p {
        font-size: 16px;
        color: #64748B;
        line-height: 1.6;
        margin: 0 0 32px;
      }
      .btn {
        display: inline-block;
        padding: 12px 32px;
        background-color: #1F4E79;
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
        border-radius: 12px;
        box-shadow: 0 4px 12px rgba(31, 78, 121, 0.15);
        transition: all 0.3s ease;
      }
      .btn:hover {
        background-color: #153856;
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(31, 78, 121, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">ন</div>
      <h1>দুঃখিত!</h1>
      <p>আপনি যে পাতাটি খুঁজছেন তা নীলাশা সাহিত্য সাময়িকীর আর্কাইভে খুঁজে পাওয়া যায়নি। সম্ভবত কোনো টাইপো হয়েছে বা লিংকটি পরিবর্তিত হয়েছে।</p>
      <a href="https://nilasha.pro.bd/" class="btn">হোমপেজে ফিরে যান</a>
    </div>
  </body>
</html>
